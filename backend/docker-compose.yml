# Production API on bare metal (Node app + Nginx reverse proxy).
# TLS is terminated by Cloudflare in front of the origin (HTTP on host port 8088).
# Local dev stack (API + static frontend): use root docker-compose.yml
#   cd .. && ./scripts/dev-up.sh

services:
  app:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: status_page_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PROXY_PORT: 3333
      SERVICES_CONFIG_PATH: /usr/src/app/config/services.yaml
      API_V2_ENABLED: "true"
      USE_RECORDING_RULES: "false"
      NODE_ENV: production
    volumes:
      - ${SERVICES_CONFIG:-../config/services.yaml}:/usr/src/app/config/services.yaml:ro
    expose:
      - "3333"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3333/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:stable-alpine
    container_name: status_page_nginx
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
