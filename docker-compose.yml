services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: status_page_api
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      PROXY_PORT: 3333
      SERVICES_CONFIG_PATH: /usr/src/app/config/services.yaml
      API_V2_ENABLED: "true"
      USE_RECORDING_RULES: "false"
      NODE_ENV: development
    ports:
      - "3333:3333"
    volumes:
      - ${SERVICES_CONFIG:-./config/services.yaml}:/usr/src/app/config/services.yaml:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3333/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: nginx:stable-alpine
    container_name: status_page_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docs:/usr/share/nginx/html:ro
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
