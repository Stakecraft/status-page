apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-page-api
  namespace: status-page
  labels:
    app: status-page-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: status-page-api
  template:
    metadata:
      labels:
        app: status-page-api
    spec:
      containers:
        - name: api
          image: ghcr.io/stakecraft/status-page-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3333
          envFrom:
            - secretRef:
                name: status-page-api-env
          env:
            - name: PROXY_PORT
              value: "3333"
            - name: SERVICES_CONFIG_PATH
              value: /config/services.yaml
            - name: API_V2_ENABLED
              value: "true"
          volumeMounts:
            - name: services-config
              mountPath: /config
              readOnly: true
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: services-config
          configMap:
            name: status-page-services
